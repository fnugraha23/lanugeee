<section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
  <div class="card reveal-init" style="width: 100%; max-width: 400px; padding: 40px; box-shadow: var(--shadow-md);">
    
    <div style="text-align: center; margin-bottom: 30px;">
      <h2 style="margin-bottom: 10px;">Selamat Datang Kembali</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Silakan masuk untuk mengakses dashboard Lontara.</p>
    </div>

    <form id="login-form">
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Alamat Email</label>
        <input type="email" id="email" required placeholder="nama@email.com" 
               style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; outline: none; transition: 0.3s;">
      </div>

      <div style="margin-bottom: 25px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Password</label>
        <input type="password" id="password" required placeholder="••••••••" 
               style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; outline: none; transition: 0.3s;">
      </div>

      <button type="submit" id="btn-login" class="btn-primary" style="width: 100%; padding: 14px; font-weight: 700; border: none; cursor: pointer;">
        Masuk ke Sistem
      </button>

      <div style="text-align: center; margin-top: 20px; font-size: 0.85rem;">
        <p style="color: var(--text-muted);">Belum punya akun? <a href="#register" class="nav-link-ajax" style="color: var(--primary); font-weight: 700;">Daftar Sekarang</a></p>
      </div>
    </form>
  </div>
</section>

<script type="module">
  // Impor fungsi yang dibutuhkan dari Firebase SDK
  import { auth } from "../../firebase-init.js"; 
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  const form = document.getElementById('login-form');
  const btnLogin = document.getElementById('btn-login');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    btnLogin.innerText = "Memproses...";
    btnLogin.disabled = true;

    try {
      // Menjalankan fungsi login Firebase
      await signInWithEmailAndPassword(auth, email, password);
      
      alert('Login berhasil! Selamat datang di Lontara.');
      
      // Arahkan ke halaman utama/dashboard setelah sukses
      window.location.hash = '#home'; 
    } catch (error) {
      // Penanganan error jika email/password salah
      console.error(error);
      alert('Login gagal: ' + error.message);
      btnLogin.innerText = "Masuk ke Sistem";
      btnLogin.disabled = false;
    }
  });
</script>
